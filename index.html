<!DOCTYPE html>
<html>
<head>
    <title>STK Push Bot</title>
</head>
<body>

<h2>Bulk STK Push</h2>

<textarea id="numbers" rows="10" cols="40" placeholder="Enter numbers separated by comma"></textarea>
<br><br>

<input type="number" id="amount" placeholder="Amount"><br><br>

<input type="text" id="reference" placeholder="Account Reference"><br><br>

<input type="number" id="delay" placeholder="Delay (ms, e.g. 5000)" value="5000"><br><br>

<button onclick="sendSTK()">Send STK Push</button>

<h3>Response:</h3>
<pre id="output"></pre>

<script>
async function sendSTK() {
    const numbers = document.getElementById("numbers").value
        .split(",")
        .map(n => n.trim())
        .filter(n => n);

    const amount = document.getElementById("amount").value;
    const reference = document.getElementById("reference").value;
    const delay = document.getElementById("delay").value;

    const res = await fetch("/send-bulk", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            numbers,
            amount,
            reference,
            delayMs: parseInt(delay)
        })
    });

    const data = await res.json();
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
